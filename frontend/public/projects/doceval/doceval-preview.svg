<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0b0b0c"/>

  <!-- Top label -->
  <text x="60" y="80" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#e6e6e6">doceval</text>
  <text x="60" y="110" font-family="system-ui,sans-serif" font-size="15" fill="#4a4a55">eval harness for LLM document extraction pipelines</text>

  <!-- Pipeline: 3 boxes + arrows -->
  <!-- Box 1: Docs -->
  <rect x="60" y="150" width="240" height="200" rx="12" fill="#111115" stroke="#2a2a35" stroke-width="1.5"/>
  <text x="180" y="200" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.06em">INPUT</text>
  <text x="180" y="240" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#e6e6e6" text-anchor="middle">Your Docs</text>
  <text x="180" y="268" font-family="system-ui,sans-serif" font-size="12" fill="#4a4a55" text-anchor="middle">PDF · PNG · JPG</text>
  <text x="180" y="286" font-family="system-ui,sans-serif" font-size="12" fill="#4a4a55" text-anchor="middle">TIFF · WEBP</text>
  <text x="180" y="316" font-family="monospace" font-size="11" fill="#4a6080" text-anchor="middle">+ labels/*.json</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="250" x2="390" y2="250" stroke="#2a2a35" stroke-width="2"/>
  <polygon points="390,244 405,250 390,256" fill="#2a2a35"/>

  <!-- Box 2: doceval (center, larger) -->
  <rect x="405" y="130" width="280" height="240" rx="12" fill="#0f1a1a" stroke="#134e4a" stroke-width="1.5"/>
  <rect x="405" y="130" width="280" height="5" rx="2" fill="#0d9488"/>
  <text x="545" y="186" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#2dd4bf" text-anchor="middle" letter-spacing="0.06em">HARNESS</text>
  <text x="545" y="228" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#e6e6e6" text-anchor="middle">doceval</text>
  <text x="545" y="262" font-family="system-ui,sans-serif" font-size="12" fill="#134e4a" text-anchor="middle">any extractor function</text>
  <text x="545" y="280" font-family="system-ui,sans-serif" font-size="12" fill="#134e4a" text-anchor="middle">any document schema</text>
  <text x="545" y="316" font-family="monospace" font-size="11" fill="#0d9488" text-anchor="middle">extract(bytes, path) → dict</text>
  <text x="545" y="336" font-family="monospace" font-size="11" fill="#0d9488" text-anchor="middle">optional: → (dict, cost)</text>

  <!-- Arrow 2 -->
  <line x1="685" y1="250" x2="770" y2="250" stroke="#2a2a35" stroke-width="2"/>
  <polygon points="770,244 785,250 770,256" fill="#2a2a35"/>

  <!-- Box 3: Report -->
  <rect x="785" y="150" width="355" height="200" rx="12" fill="#111115" stroke="#2a2a35" stroke-width="1.5"/>
  <text x="962" y="200" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.06em">OUTPUT</text>
  <text x="962" y="240" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#e6e6e6" text-anchor="middle">Accuracy Report</text>
  <text x="962" y="268" font-family="monospace" font-size="12" fill="#4ade80" text-anchor="middle">field-level accuracy</text>
  <text x="962" y="286" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle">failure mode taxonomy</text>
  <text x="962" y="304" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle">cost per document</text>
  <text x="962" y="328" font-family="monospace" font-size="11" fill="#4a4a55" text-anchor="middle">→ markdown + JSON</text>

  <!-- Bottom stats row -->
  <line x1="60" y1="410" x2="1140" y2="410" stroke="#1a1a1f" stroke-width="1"/>

  <text x="160" y="455" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4a4a55" text-anchor="middle">FAILURE MODES</text>
  <text x="160" y="484" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle">missed_field</text>
  <text x="160" y="502" font-family="monospace" font-size="12" fill="#f87171" text-anchor="middle">hallucination</text>
  <text x="160" y="520" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle">wrong_format</text>
  <text x="160" y="538" font-family="monospace" font-size="12" fill="#a1a1aa" text-anchor="middle">wrong_value</text>

  <line x1="290" y1="418" x2="290" y2="548" stroke="#1a1a1f" stroke-width="1"/>

  <text x="530" y="455" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4a4a55" text-anchor="middle">NUMERIC NORMALISATION</text>
  <text x="530" y="490" font-family="monospace" font-size="13" fill="#a1a1aa" text-anchor="middle">$1,234.56  =  1234.56  =  1.234,56</text>
  <text x="530" y="520" font-family="monospace" font-size="13" fill="#a1a1aa" text-anchor="middle">Nov 15 2012  =  2012-11-15</text>

  <line x1="770" y1="418" x2="770" y2="548" stroke="#1a1a1f" stroke-width="1"/>

  <text x="955" y="455" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4a4a55" text-anchor="middle">OPEN SOURCE</text>
  <text x="955" y="490" font-family="monospace" font-size="13" fill="#2dd4bf" text-anchor="middle">pip install doceval</text>
  <text x="955" y="520" font-family="system-ui,sans-serif" font-size="12" fill="#4a4a55" text-anchor="middle">github.com/dave8172/doceval</text>
</svg>
