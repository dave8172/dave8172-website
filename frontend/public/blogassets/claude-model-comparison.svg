<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0b0b0c"/>

  <!-- Left card: Haiku+Sonnet -->
  <rect x="60" y="80" width="420" height="360" rx="16" fill="#0f1419" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="60" y="80" width="420" height="6" rx="3" fill="#2563eb"/>
  <text x="90" y="136" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#60a5fa" letter-spacing="0.08em">HAIKU + SONNET · 1500px</text>
  <text x="90" y="230" font-family="system-ui,sans-serif" font-size="88" font-weight="700" fill="#e6e6e6">96.3%</text>
  <text x="90" y="270" font-family="system-ui,sans-serif" font-size="14" fill="#4a6080">field accuracy · 105 documents</text>

  <line x1="90" y1="298" x2="440" y2="298" stroke="#1e3a5f" stroke-width="1"/>

  <text x="90" y="330" font-family="monospace" font-size="14" fill="#60a5fa">$0.08  per run</text>
  <text x="90" y="356" font-family="monospace" font-size="14" fill="#4ade80">97.9%  digital invoices</text>
  <text x="90" y="382" font-family="monospace" font-size="14" fill="#f59e0b">69.8%  scanned receipts</text>
  <text x="90" y="408" font-family="monospace" font-size="14" fill="#a1a1aa">95.2%  document_number</text>

  <!-- Center: cost ratio -->
  <text x="555" y="195" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#4a4a55" text-anchor="middle">cost</text>
  <text x="555" y="255" font-family="system-ui,sans-serif" font-size="56" font-weight="700" fill="#e6e6e6" text-anchor="middle">12×</text>
  <text x="555" y="285" font-family="system-ui,sans-serif" font-size="13" fill="#4a4a55" text-anchor="middle">more expensive</text>
  <!-- Arrow down -->
  <line x1="555" y1="310" x2="555" y2="370" stroke="#2a2a30" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="555" y="395" font-family="system-ui,sans-serif" font-size="12" fill="#4a4a55" text-anchor="middle">for only</text>
  <text x="555" y="418" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#a1a1aa" text-anchor="middle">+2 pts</text>

  <!-- Right card: Opus -->
  <rect x="660" y="80" width="480" height="360" rx="16" fill="#0f1a14" stroke="#1a4a2e" stroke-width="1.5"/>
  <rect x="660" y="80" width="480" height="6" rx="3" fill="#16a34a"/>
  <text x="690" y="136" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4ade80" letter-spacing="0.08em">CLAUDE OPUS · 7500px</text>
  <text x="690" y="230" font-family="system-ui,sans-serif" font-size="88" font-weight="700" fill="#e6e6e6">98.3%</text>
  <text x="690" y="270" font-family="system-ui,sans-serif" font-size="14" fill="#1a4a2e">field accuracy · 105 documents</text>

  <line x1="690" y1="298" x2="1100" y2="298" stroke="#1a4a2e" stroke-width="1"/>

  <text x="690" y="330" font-family="monospace" font-size="14" fill="#4ade80">$1.00  per run</text>
  <text x="690" y="356" font-family="monospace" font-size="14" fill="#4ade80">99.2%  digital invoices</text>
  <text x="690" y="382" font-family="monospace" font-size="14" fill="#f59e0b">83.0%  scanned receipts</text>
  <text x="690" y="408" font-family="monospace" font-size="14" fill="#a1a1aa">95.2%  document_number</text>

  <!-- Bottom title -->
  <text x="60" y="502" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#e6e6e6">98.3% vs 96.3%: the cost-accuracy tradeoff on invoice extraction.</text>
  <text x="60" y="538" font-family="system-ui,sans-serif" font-size="14" fill="#4a4a55">dave8172.com</text>
</svg>
