<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0b0b0c"/>

  <!-- Left: CLI output terminal -->
  <rect x="60" y="70" width="520" height="300" rx="10" fill="#111115" stroke="#1f1f23" stroke-width="1.5"/>
  <rect x="60" y="70" width="520" height="38" rx="10" fill="#1a1a1f"/>
  <rect x="60" y="96" width="520" height="12" fill="#1a1a1f"/>
  <circle cx="91" cy="89" r="7" fill="#ff5f57"/>
  <circle cx="115" cy="89" r="7" fill="#febc2e"/>
  <circle cx="139" cy="89" r="7" fill="#28c840"/>

  <text x="88" y="138" font-family="monospace" font-size="13" fill="#a1a1aa">$ doceval run --docs ./docs --labels ./labels</text>
  <text x="88" y="162" font-family="monospace" font-size="12" fill="#4a4a55">  extractor: my_module:extract  ·  20 docs</text>
  <text x="88" y="190" font-family="monospace" font-size="12" fill="#4a4a55">──────────────────────────────────────────────</text>
  <text x="88" y="214" font-family="monospace" font-size="13" fill="#4ade80">[ 1/20] invoice_001.pdf   9/9 (100%)   1.3s</text>
  <text x="88" y="236" font-family="monospace" font-size="13" fill="#4ade80">[ 2/20] invoice_002.pdf  10/10 (100%)  1.1s</text>
  <text x="88" y="258" font-family="monospace" font-size="13" fill="#f59e0b">[ 3/20] invoice_003.pdf   8/9  (89%)   1.4s</text>
  <text x="88" y="280" font-family="monospace" font-size="12" fill="#4a4a55">  ...</text>
  <text x="88" y="310" font-family="monospace" font-size="13" fill="#e6e6e6">Overall: 172/180 fields correct (95.6%)</text>
  <text x="88" y="334" font-family="monospace" font-size="12" fill="#4a4a55">Report → eval-report-2026-06-17.md</text>
  <text x="88" y="354" font-family="monospace" font-size="12" fill="#4a4a55">Cost  → $0.0009/doc avg  ($0.018 total)</text>

  <!-- Right top: overall accuracy -->
  <rect x="640" y="70" width="500" height="140" rx="10" fill="#111115" stroke="#1f1f23" stroke-width="1.5"/>
  <text x="668" y="112" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#a1a1aa">Field accuracy · any extractor · any schema</text>
  <text x="668" y="182" font-family="system-ui,sans-serif" font-size="66" font-weight="700" fill="#e6e6e6">95.6%</text>

  <!-- Right bottom: failure modes -->
  <rect x="640" y="230" width="500" height="140" rx="10" fill="#111115" stroke="#1f1f23" stroke-width="1.5"/>
  <text x="668" y="270" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#a1a1aa">Failure mode taxonomy</text>

  <text x="668" y="302" font-family="monospace" font-size="14" fill="#f59e0b">missed_field    5   field present, not extracted</text>
  <text x="668" y="326" font-family="monospace" font-size="14" fill="#f87171">hallucination   2   extracted, not in document</text>
  <text x="668" y="350" font-family="monospace" font-size="14" fill="#60a5fa">wrong_format    3   numeric / date mismatch</text>

  <!-- Bottom bar -->
  <text x="60" y="430" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#e6e6e6">doceval — eval harness for LLM</text>
  <text x="60" y="462" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#e6e6e6">document extraction pipelines.</text>
  <text x="60" y="500" font-family="system-ui,sans-serif" font-size="15" fill="#a1a1aa">github.com/dave8172/doceval</text>
</svg>
